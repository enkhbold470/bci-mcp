# Manufact Cloud (formerly mcp-use) deployment hints.
#
# Recommended dashboard settings:
#   Port: 8000
#   Build command: (empty — auto-buildpack runs `uv sync --frozen`)
#   Start command: (leave empty — Manufact auto-detects `uvicorn bci_mcp:app`)
#   Or explicitly: uvicorn bci_mcp:app --host 0.0.0.0 --port 8000

[deploy]
port = 8000
start_command = "uvicorn bci_mcp:app --host 0.0.0.0 --port 8000"
