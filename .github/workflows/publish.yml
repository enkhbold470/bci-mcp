name: publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Verify tag matches package versions
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PY="$(grep '^version = ' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')"
          NPM="$(node -p "require('./npm/bci-mcp/package.json').version")"
          SRV="$(node -p "require('./server.json').version")"
          SRV_PKGS="$(node -p "require('./server.json').packages.map(p => p.version).join(' ')")"
          echo "tag=v${TAG} pyproject=${PY} npm=${NPM} server.json=${SRV} (${SRV_PKGS})"
          test "$TAG" = "$PY" || { echo "pyproject.toml version must match tag"; exit 1; }
          test "$TAG" = "$NPM" || { echo "npm/bci-mcp/package.json version must match tag"; exit 1; }
          test "$TAG" = "$SRV" || { echo "server.json version must match tag"; exit 1; }
          for v in $SRV_PKGS; do
            test "$TAG" = "$v" || { echo "server.json packages[].version must match tag"; exit 1; }
          done

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - run: python -m pip install -e ".[dev]"
      - run: ruff check src tests
      - run: python -m pytest

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - name: Build and verify wheel
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          uv build
          test -f "dist/bci_mcp-${TAG}-py3-none-any.whl"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "24"
      - run: npm pack --dry-run
        working-directory: npm/bci-mcp

  pypi:
    needs: verify
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - run: uv build
      - name: Ensure sdist does not ship secrets
        run: |
          ! tar -tzf dist/*.tar.gz | grep -E '(^|/)\.env'
      - run: uv publish dist/*

  npm:
    needs: verify
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
      - run: npm publish --access public --provenance
        working-directory: npm/bci-mcp
