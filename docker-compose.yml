# The BCI-MCP server speaks MCP over stdio, so this just builds the image and
# keeps stdin open for an MCP client to attach. Most users will instead point
# their MCP client straight at `docker run --rm -i bci-mcp`.
services:
  bci-mcp:
    build: .
    image: bci-mcp
    container_name: bci-mcp-server
    stdin_open: true   # keep STDIN open for the stdio JSON-RPC transport
    tty: false
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./recordings:/data   # recordings written by the `record` tool
